<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - BSIT Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .register-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #28a745; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Student Login</h2>
        <div th:if="${error}" 
            style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; text-align: center; border: 1px solid #f5c6cb;">
            ⚠️ <span th:text="${error}">Error Message</span>
        </div>

        <form th:action="@{/login}" method="post">
            </form>
        <form th:action="@{/login}" method="post">
            <input type="text" name="studentId" placeholder="Student ID" required>
            
            <input type="password" name="password" id="loginPass" placeholder="Password" required>
            
            <div style="text-align: left; font-size: 0.85em; margin: 5px 0;">
                <input type="checkbox" onclick="togglePass('loginPass')" style="width: auto; margin-right: 5px;"> 
                Show Password
            </div>

            <button type="submit">Login</button>
            <a href="/register" class="register-link">New student? Register here</a>
        </form>
    </div>

    <script>
        function togglePass(inputId) {
            var x = document.getElementById(inputId);
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }
    </script>
    </div>
</body>
</html>
