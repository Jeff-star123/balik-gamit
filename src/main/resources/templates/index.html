<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BALIK GAMIT | Lost & Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        
        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            width: 100%;
            margin-bottom: 40px;
        }

        .item-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: transform 0.2s; }
        .item-card:hover { transform: translateY(-5px); }
        
        .image-container img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #eee; }
        .card-content { padding: 15px; flex-grow: 1; }
        
        .status-badge { position: absolute; top: 10px; left: 10px; background: #007bff; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        .category-tag { display: inline-block; background: #e9ecef; color: #495057; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .mod-badge { color: #dc3545; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }
        .section-title { margin-top: 40px; border-bottom: 2px solid #ddd; padding-bottom: 10px; width: 100%; font-weight: 600; }
        .logout-btn { background-color: #6c757d; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; float: right; transition: background 0.3s; }
        .logout-btn:hover { background-color: #5a6268; }

        .btn-restore { background: #17a2b8; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 10px; }

        /* No Results Message */
        #noResultsMessage {
            display: none;
            width: 100%;
            text-align: center;
            padding: 50px 20px;
            background: white;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Lightbox Styles */
        .lightbox-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .close-lightbox { position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }
        .lightbox-content-container { display: flex; justify-content: center; align-items: center; height: 100%; }
        .lightbox-content { max-width: 80%; max-height: 80%; transition: transform 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/logout}" class="logout-btn" onclick="return confirm('Are you sure you want to log out of BALIK GAMIT?')">Logout</a>

        <h1>BALIK GAMIT</h1>

        <div class="section-card">
            <h3>Report a Found Item</h3>
            <form th:action="@{/report}" method="post" enctype="multipart/form-data" class="report-form">
                <input type="text" name="itemName" placeholder="Item Name" required>
                <select name="category" id="reportCategory" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Electronics">📱 Electronics</option>
                    <option value="ID/Documents">🪪 IDs / Documents</option>
                    <option value="Keys">🔑 Keys</option>
                    <option value="Wallets/Bags">💼 Wallets & Bags</option>
                    <option value="Others">📦 Others</option>
                </select>
                <input type="text" name="description" placeholder="Description (e.g. Color, brand, where found)" class="full-width" required>
                <input type="text" name="contactInfo" placeholder="Your Contact Info" required>
                <input type="file" name="imageFile" accept="image/*">
                <button type="submit" class="full-width">Post to Feed</button>
            </form>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" data-cat="all" onclick="filterByCategory('all', event)">All</button>
            <button class="filter-btn" data-cat="Electronics" onclick="filterByCategory('Electronics', event)">📱 Electronics</button>
            <button class="filter-btn" data-cat="ID/Documents" onclick="filterByCategory('ID/Documents', event)">🪪 IDs</button>
            <button class="filter-btn" data-cat="Keys" onclick="filterByCategory('Keys', event)">🔑 Keys</button>
            <button class="filter-btn" data-cat="Wallets/Bags" onclick="filterByCategory('Wallets/Bags', event)">💼 Wallets</button>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="itemSearch" onkeyup="filterItems()" placeholder="Search items by name or description...">
        </div>

        <div id="noResultsMessage">
            <p style="font-size: 1.2em; color: #6c757d;">🔍 No items found matching your filter.</p>
            <button onclick="resetFilters()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Show All Items</button>
        </div>

        <h2 class="section-title">Active Feed</h2>
        <div class="item-grid" id="activeFeed">
            <div th:each="item : ${items}" class="item-card">
                <div class="image-container" style="position: relative;">
                    <span class="status-badge">Found</span>
                    <img th:src="${item.imagePath != null ? item.imagePath : '/images/default.jpg'}" alt="Item image" onclick="openLightbox(this)" style="cursor: pointer;">
                </div>
                <div class="card-content">
                    <span class="category-tag" th:text="${item.category}">Category</span>
                    <h3 th:text="${item.name}">Item Name</h3>
                    <p class="item-description" th:text="${item.description}">Description</p>
                    <p style="font-size: 0.9em; color: #555;"><strong>📞 Contact: </strong> <span th:text="${item.contactInfo}">No info provided</span></p>
                    <p><small>Posted: <span th:text="${item.getFormattedDate()}"></span></small></p>
                    
                    <div th:if="${session.loggedInStudent != null and (session.loggedInStudent.studentId == item.poster.studentId or session.loggedInStudent.isAdmin)}" style="margin-top: 10px;">
                        <p th:if="${session.loggedInStudent.isAdmin and session.loggedInStudent.studentId != item.poster.studentId}" class="mod-badge">MODERATOR MODE</p>
                        <div style="display: flex; gap: 5px;">
                            <form th:action="@{'/finish/' + ${item.id}}" method="post" style="flex:1;"><button type="submit" style="background:#28a745; color:white; border:none; padding:8px; border-radius:5px; width:100%; cursor:pointer;">Finish</button></form>
                            <form th:action="@{'/delete/' + ${item.id}}" method="post" style="flex:1;"><button type="submit" onclick="return confirm('Delete this post?')" style="background:#dc3545; color:white; border:none; padding:8px; border-radius:5px; width:100%; cursor:pointer;">Delete</button></form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="section-title" style="color: #28a745;">✅ Archive</h2>
        <div class="item-grid" id="archiveFeed">
            <div th:each="item : ${archivedItems}" class="item-card" style="border-left: 5px solid #28a745; opacity: 0.8;">
                <div class="card-content">
                    <span class="category-tag" th:text="${item.category}">Category</span>
                    <h3 th:text="${item.name}">Item Name</h3>
                    <p class="item-description" th:text="${item.description}">Description</p>
                    <div th:if="${session.loggedInStudent != null and (session.loggedInStudent.studentId == item.poster.studentId or session.loggedInStudent.isAdmin)}">
                        <form th:action="@{'/restore/' + ${item.id}}" method="post"><button type="submit" class="btn-restore">Restore Item</button></form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="lightbox-modal">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content-container"><img class="lightbox-content" id="imgFull"></div>
    </div>

    <script>
    let currentCategory = 'all';

    function filterItems() {
        applyFilters();
    }

    function filterByCategory(category, event) {
        // Force the state - no toggling
        currentCategory = category;
        
        // Update UI Visuals
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.currentTarget) {
            event.currentTarget.classList.add('active');
        } else {
            // Re-highlight 'All' button if reset via function
            document.querySelector('[data-cat="all"]').classList.add('active');
        }
        
        applyFilters();
    }

    function resetFilters() {
        document.getElementById('itemSearch').value = '';
        filterByCategory('all');
    }

    function applyFilters() {
        const searchText = document.getElementById('itemSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.item-card');
        const noResults = document.getElementById('noResultsMessage');
        let visibleCount = 0;

        cards.forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            const desc = card.querySelector('.item-description').innerText.toLowerCase();
            const tag = card.querySelector('.category-tag');
            const cardCategory = tag ? tag.innerText.trim() : "";

            const matchesSearch = title.includes(searchText) || desc.includes(searchText);
            
            // Logic: Must match the currentCategory state exactly OR be 'all'
            const matchesCategory = (currentCategory === 'all' || cardCategory === currentCategory);

            if (matchesSearch && matchesCategory) {
                card.style.display = "flex"; // Use flex to maintain card layout
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });

        // Toggle visibility of the "No Results" container
        noResults.style.display = (visibleCount === 0) ? "block" : "none";
    }

    // Lightbox Logic
    let isZoomed = false;
    function openLightbox(element) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("imgFull");
        modal.style.display = "block";
        modalImg.src = element.src;
        modalImg.style.transform = "scale(1)";
        isZoomed = false;
        modalImg.style.cursor = "zoom-in";
    }

    function closeLightbox() { document.getElementById("imageModal").style.display = "none"; }

    document.getElementById("imgFull").onclick = function() {
        if (!isZoomed) {
            this.style.transform = "scale(2)";
            this.style.cursor = "zoom-out";
            isZoomed = true;
        } else {
            this.style.transform = "scale(1)";
            this.style.cursor = "zoom-in";
            isZoomed = false;
        }
    };

    window.onclick = function(e) { if (e.target.id === "imageModal") closeLightbox(); };
    </script>
</body>
</html>
