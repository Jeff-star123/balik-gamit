<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - BALIK GAMIT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #007bff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-box { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        
        <div th:if="${error}" class="error-box">
            ⚠️ <span th:text="${error}">Error Message</span>
        </div>

        <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">
            Enter your Student ID and we will send a reset code to your registered email.
        </p>

        <form th:action="@{/forgot-password/send-otp}" method="post">
            <input type="email" name="email" placeholder="Enter your registered Email" required>
            <button type="submit">Send Reset OTP</button>
        </form>

        <div style="margin-top: 20px;">
            <a href="/login" style="text-decoration: none; color: #555; font-size: 0.85em;">Back to Login</a>
        </div>
    </div>
</body>
</html>
