<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>BALIK GAMIT | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- FIGMA DESIGN SYSTEM --- */
        :root {
            --glass-heavy: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --primary-accent: #23a6d5;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card { 
            background: var(--glass-heavy); 
            backdrop-filter: blur(20px);
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        h2 { 
            color: #1e272e; 
            margin: 0 0 10px 0; 
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input { 
            width: 100%; 
            padding: 14px 18px; 
            margin: 10px 0; 
            border: 2px solid #f1f2f6; 
            border-radius: 15px; 
            background: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            color: #1e272e !important;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { 
            border-color: var(--primary-accent);
            outline: none;
            box-shadow: 0 0 10px rgba(35, 166, 213, 0.1);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, #23a6d5, #23d5ab);
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 15px rgba(35, 166, 213, 0.3);
        }

        button:hover { 
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(35, 166, 213, 0.4);
        }

        .error-box { 
            color: white; 
            background: #ff7675; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            font-size: 0.85rem;
            font-weight: 500;
        }

        .back-link { 
            display: inline-block;
            margin-top: 25px; 
            text-decoration: none; 
            color: #636e72; 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: 0.3s;
        }

        .back-link:hover { color: #e73c7e; }

        /* --- FIGMA CENTRAL NOTIFICATION STYLES (MATCHING REGISTER) --- */
        #central-notif-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .figma-modal {
            background: white;
            padding: 50px 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.2);
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .figma-modal.active {
            transform: scale(1);
            opacity: 1;
        }

        .modal-icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #23d5ab, #23a6d5);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px rgba(35, 213, 171, 0.3);
        }

        .modal-content h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e272e;
        }

        .modal-content p {
            margin: 0 0 25px 0;
            color: #636e72;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            background: #1e272e;
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn:hover {
            background: #000;
        }
    </style>
</head>
<body>

    <div id="central-notif-overlay">
        <div id="central-modal" class="figma-modal">
            <div class="modal-icon-container">
                <i class="fa-solid fa-paper-plane"></i>
            </div>
            <div class="modal-content">
                <h3 id="notif-title">Success!</h3>
                <p id="notif-message">Request has been sent.</p>
            </div>
            <button class="modal-btn" onclick="closeCentralNotif()">Okay, got it!</button>
        </div>
    </div>

    <div class="card">
        <h2>Reset Access</h2>
        
        <div th:if="${error}" class="error-box">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Error Message</span>
        </div>

        <p class="subtitle">
            Enter your registered email and we'll send you a secure 6-digit code to reset your password.
        </p>

        <form id="resetForm" th:action="@{/forgot-password/send-otp}" method="post">
            <input type="email" name="email" id="emailInput" placeholder="Institutional Email" required>
            <button type="submit">Get Reset Code</button>
        </form>

        <div style="margin-top: 10px;">
            <a href="/login" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        // --- CENTRAL NOTIFICATION LOGIC (Same as Register) ---
        function showCentralNotif(title, message, iconClass = 'fa-paper-plane') {
            const overlay = document.getElementById('central-notif-overlay');
            const modal = document.getElementById('central-modal');
            const icon = modal.querySelector('.modal-icon-container i');
            
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-message').innerText = message;
            icon.className = `fa-solid ${iconClass}`;

            overlay.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); }, 10);
        }

        function closeCentralNotif() {
            const modal = document.getElementById('central-modal');
            modal.classList.remove('active');
            setTimeout(() => {
                document.getElementById('central-notif-overlay').style.display = 'none';
                // Trigger form submission after modal is closed
                document.getElementById('resetForm').submit();
            }, 400);
        }

        // --- FORM SUBMISSION INTERCEPTION ---
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent immediate submission to show the modal
            const email = document.getElementById('emailInput').value;
            if(email) {
                showCentralNotif(
                    "Request Sent", 
                    "We are sending a 6-digit reset code to " + email + ". Please check your inbox shortly.",
                    "fa-envelope-circle-check"
                );
            }
        });
    </script>
</body>
</html>
