<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BALIK GAMIT | My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        })();
    </script>

    <style>
        /* --- ORIGINAL STYLES --- */
        .post-panel h3 {
            color: #1e272e !important;
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            text-shadow: none;
        }

        .post-panel button[type="submit"] {
            background: #00b894 !important;
            color: white !important;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }

        .post-panel button[type="submit"]:hover {
            background: #00947a !important;
            transform: translateY(-2px);
        }

        /* 1. Reset browser defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. Ensure the Body doesn't center its children */
        body {
            display: flex;
            flex-direction: row; /* Force side-by-side layout */
            align-items: stretch;
            justify-content: flex-start; /* Force everything to the left */
            text-align: left;
        }

        /* 3. Explicit Sidebar Positioning */
        .sidebar {
            width: 250px;
            min-width: 250px;
            height: 100vh;
            position: sticky; /* Or fixed */
            top: 0;
            left: 0;
            /* Ensure it doesn't shrink */
            flex-shrink: 0; 
        }

        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-heavy: rgba(255, 255, 255, 0.95);
            --sidebar-width: 280px;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --card-border: rgba(255, 255, 255, 0.5);
            --accent: #764ba2;
            --found-green: #00b894;
            --lost-red: #ff7675;
        }

        [data-theme="dark"] {
            --glass: rgba(0, 0, 0, 0.3);
            --glass-heavy: rgba(30, 30, 30, 0.95);
            --text-main: #f5f6fa;
            --text-sub: #b2bec3;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-heavy: rgba(255, 255, 255, 0.95);
            --sidebar-width: 280px;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --card-border: rgba(255, 255, 255, 0.5);
            --accent: #764ba2;
        }

        [data-theme="dark"] {
            --glass: rgba(0, 0, 0, 0.3);
            --glass-heavy: rgba(30, 30, 30, 0.95);
            --text-main: #f5f6fa;
            --text-sub: #b2bec3;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            height: 100vh;
            position: fixed;
            padding: 40px 20px;
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 { font-weight: 800; margin-bottom: 40px; text-align: center; }
        .sidebar-nav { list-style: none; padding: 0; margin: 0; }
        .sidebar-nav li a {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: 0.3s;
            font-weight: 500;
        }
        .sidebar-nav li a:hover, .sidebar-nav li a.active { background: rgba(255, 255, 255, 0.2); transform: translateX(8px); }

        /* --- MAIN CONTENT --- */
        .dashboard-container {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 60px;
        }

        /* Profile Header Card */
        .profile-card {
            background: var(--glass-heavy);
            padding: 50px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid var(--card-border);
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile-info h1 { margin: 0; font-size: 2.5rem; color: var(--text-main); }
        .profile-info p { margin: 5px 0; color: var(--text-sub); font-size: 1.1rem; }

        /* Archive Section */
        .section-title { color: white; margin-bottom: 5px; font-weight: 700; font-size: 1.8rem; }
        .section-subtitle { color: rgba(255,255,255,0.8); margin-bottom: 30px; font-size: 1rem; }
        
        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }
        
        .item-card { 
            background: var(--glass-heavy); 
            border-radius: 25px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }
        .item-card:hover { transform: translateY(-5px); }

        .image-container { position: relative; height: 180px; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            background: #95a5a6;
            color: white;
        }

        .card-content { padding: 20px; }
        .category-tag { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .item-description { font-size: 0.9rem; color: var(--text-sub); margin: 10px 0; }

        /* Restore Button */
        .btn-action-restore {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-action-restore:hover { opacity: 0.9; transform: scale(1.02); }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: var(--glass);
            border-radius: 30px;
            color: white;
            border: 1px dashed rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>BALIK GAMIT</h2>
        <ul class="sidebar-nav">
            <li><a th:href="@{/}"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a th:href="@{/profile}" class="active"><i class="fa-solid fa-user"></i> Profile</a></li>
            <li><a th:href="@{/settings}"><i class="fa-solid fa-gear"></i> Settings</a></li>
            <li><a th:href="@{/developers}"><i class="fa-solid fa-code"></i> Developers</a></li>
        </ul>
        <div style="margin-top: auto; padding-bottom: 20px;">
            <a th:href="@{/logout}" style="color: #ff7675; text-decoration: none; font-weight: 600;" onclick="return confirm('Log out?')">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="profile-card">
            <div class="profile-avatar" th:text="${session.loggedInStudent.name.substring(0,1)}">U</div>
            <div class="profile-info">
                <h1 th:text="${session.loggedInStudent.name}">Student Name</h1>
                <p><i class="fa-solid fa-id-card"></i> ID: <span th:text="${session.loggedInStudent.studentId}">0000</span></p>
            </div>
        </div>

        <h2 class="section-title">📦 My Resolved Items</h2>
        <p class="section-subtitle">These items are hidden from the public dashboard.</p>

        <div class="item-grid">
            <div th:each="item : ${myFinishedItems}" class="item-card">
                <div class="image-container">
                    <span class="status-badge">RESOLVED</span>
                    <img th:src="${item.imagePath != null ? item.imagePath : '/images/default.jpg'}" alt="Item">
                </div>
                <div class="card-content">
                    <span class="category-tag" th:text="${item.category}">Category</span>
                    <h3 th:text="${item.name}" style="margin: 5px 0; color: var(--text-main);">Item Name</h3>
                    <p class="item-description" th:text="${item.description}">Description</p>
                    
                    <form th:action="@{'/restore/' + ${item.id}}" method="post">
                        <button type="submit" class="btn-action-restore" 
                                onclick="return confirm('Restore this item to the public dashboard?')">
                            <i class="fa-solid fa-arrow-rotate-left"></i> Restore to Feed
                        </button>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(myFinishedItems)}" class="empty-state">
                <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 15px;"></i>
                <p>You don't have any resolved items yet.</p>
            </div>
        </div>
    </main>
</body>
</html>
