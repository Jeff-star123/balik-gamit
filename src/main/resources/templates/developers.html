<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BALIK GAMIT | Meet the Team</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text-dark: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 1. Full Width Header */
        .full-header {
            width: 100%;
            height: 350px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 8px solid rgba(255,255,255,0.2);
        }

        .header-bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
            filter: brightness(0.4);
        }

        .header-text {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .header-text h1 {
            font-size: 4.5rem;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 2. Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            max-width: 1500px;
            margin: 50px auto;
            padding: 0 50px;
            flex-grow: 1;
            align-items: start;
        }

        /* 3. Left Column: Special Thanks */
        .thanks-column {
            position: sticky;
            top: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px 40px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .thanks-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .thanks-message {
            font-size: 1.4rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* 4. Right Column: BIGGER Developers */
        .dev-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .dev-card-big {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            gap: 35px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .dev-card-big:hover {
            transform: scale(1.03) translateX(10px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
        }

        .dev-img-box {
            position: relative;
            flex-shrink: 0;
        }

        .dev-img {
            width: 160px;
            height: 160px;
            border-radius: 25px;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .dev-info h3 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-dark);
            font-weight: 800;
        }

        .role-badge-big {
            display: inline-block;
            background: var(--primary-grad);
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-text {
            margin: 0;
            color: #636e72;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Admin Buttons */
        .edit-btn {
            background: #ff7675;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.4);
        }

        .banner-edit { position: absolute; top: 30px; right: 30px; }
        .thanks-edit { position: absolute; top: 20px; right: 20px; }
        .card-edit { position: absolute; bottom: -10px; right: -10px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
        }
        textarea { width: 100%; height: 250px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="full-header">
        <img th:src="${bannerUrl}" class="header-bg-img">
        <div class="header-text">
            <p style="letter-spacing: 5px; font-weight: 600; margin-bottom: 10px; opacity: 0.8;">OUR CREATIVE TEAM</p>
            <h1>Meet Our Developers</h1>
        </div>
        <button th:if="${isAdmin}" class="edit-btn banner-edit" onclick="openBannerModal()">✏️</button>
    </header>

    <div class="main-layout">
        
        <aside class="thanks-column">
            <button th:if="${isAdmin}" class="edit-btn thanks-edit" onclick="openMessageModal()">✏️</button>
            <h2 class="thanks-title">Special Thanks</h2>
            <div class="thanks-message">
                <p id="currentThanksDisplay" th:text="${specialThanks != null ? specialThanks : 'We would like to express our deepest gratitude to everyone who supported us in making the BALIK GAMIT system a reality. 

OUR MENTOR 

A special note of thanks to Sir Arjet Ragub Millan. Thank you, Sir, for your invaluable guidance, patience, and technical expertise. Your mentorship was the compass that helped us navigate the complexities of this system. We are truly grateful for the time you invested in our growth.'}"></p>
            </div>
            <div style="margin-top: 40px;">
                <a th:href="@{/}" style="color: white; text-decoration: none; border: 2px solid white; padding: 12px 30px; border-radius: 50px; font-weight: 600;">← Back Home</a>
            </div>
        </aside>

        <section class="dev-column">
            <div th:each="dev, iterStat : ${developers}" class="dev-card-big">
                <div class="dev-img-box">
                    <img th:src="${dev.photoUrl}" class="dev-img">
                    <button th:if="${isAdmin}" class="edit-btn card-edit" 
                            th:onclick="'openDevModal(' + ${iterStat.index} + ')'">✏️</button>
                </div>
                <div class="dev-info">
                    <h3 th:text="${dev.name}">Developer Name</h3>
                    <div class="role-badge-big" th:text="${dev.contributions}">Lead Programmer</div>
                    <p class="section-text">
                        Section: <span th:text="${dev.section}">BSIT 1-01</span>
                    </p>
                </div>
            </div>
        </section>

    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">Update Content</h2>
            <form id="updateForm" th:action="@{/developers/update}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="devIndex" id="devIndex">
                
                <div id="devGroup">
                    <label>Profile Image:</label><br>
                    <input type="file" name="photo"><br><br>
                    <input type="text" name="name" id="editName" placeholder="Full Name">
                    <input type="text" name="contributions" id="editContrib" placeholder="Role">
                    <input type="text" name="section" id="editSection" placeholder="Section">
                </div>

                <div id="thanksGroup" style="display:none;">
                    <label>Edit Message:</label>
                    <textarea name="specialThanks" id="editThanksText"></textarea>
                </div>

                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button type="submit" style="flex:1; padding:15px; background:var(--primary-grad); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">Save Changes</button>
                    <button type="button" onclick="closeModal()" style="flex:1; background:#f1f3f5; border:none; border-radius:15px; cursor:pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openDevModal(index) {
            document.getElementById('devIndex').value = index;
            document.getElementById('modalTitle').innerText = "Edit Developer";
            document.getElementById('devGroup').style.display = 'block';
            document.getElementById('thanksGroup').style.display = 'none';
            toggleInputs(false);
            document.getElementById('editModal').style.display = 'flex';
        }

        function openBannerModal() {
            document.getElementById('devIndex').value = -1;
            document.getElementById('modalTitle').innerText = "Edit Banner";
            document.getElementById('devGroup').style.display = 'block'; 
            document.getElementById('thanksGroup').style.display = 'none';
            toggleInputs(false);
            document.getElementById('editModal').style.display = 'flex';
        }

        function openMessageModal() {
            document.getElementById('devIndex').value = -2;
            document.getElementById('modalTitle').innerText = "Edit Special Thanks";
            document.getElementById('devGroup').style.display = 'none';
            document.getElementById('thanksGroup').style.display = 'block';
            
            const currentMessage = document.getElementById('currentThanksDisplay').innerText;
            document.getElementById('editThanksText').value = currentMessage;
            
            toggleInputs(true);
            document.getElementById('editModal').style.display = 'flex';
        }

        function toggleInputs(isThanksMode) {
            document.getElementById('editName').disabled = isThanksMode;
            document.getElementById('editContrib').disabled = isThanksMode;
            document.getElementById('editSection').disabled = isThanksMode;
            document.getElementById('editThanksText').disabled = !isThanksMode;
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('editModal')) closeModal();
        }
    </script>
</body>
</html>
