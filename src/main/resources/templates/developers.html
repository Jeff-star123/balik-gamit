<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BALIK GAMIT | Meet the Team</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text-dark: #2d3436;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .full-header {
            width: 100%; height: 350px;
            position: relative; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden; border-bottom: 8px solid rgba(255,255,255,0.2);
        }

        .header-bg-img {
            width: 100%; height: 100%;
            object-fit: cover; position: absolute;
            z-index: 1; filter: brightness(0.4);
        }

        .header-text { position: relative; z-index: 2; text-align: center; color: white; }
        .header-text h1 { font-size: 4.5rem; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .main-layout {
            display: grid; grid-template-columns: 1fr 1.5fr;
            gap: 40px; max-width: 1500px;
            margin: 50px auto; padding: 0 50px;
            flex-grow: 1; align-items: start;
        }

        .thanks-column {
            position: sticky; top: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px); border-radius: 40px;
            padding: 60px 40px; color: white;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .thanks-title { font-size: 3rem; font-weight: 800; margin-bottom: 30px; }
        .thanks-message { font-size: 1.4rem; line-height: 1.8; white-space: pre-wrap; }

        .dev-column { display: flex; flex-direction: column; gap: 30px; }

        .dev-card-big {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 35px; border-radius: 35px;
            display: flex; align-items: center; gap: 35px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Styling for the 6th (Last) Developer */
        .featured-dev {
            transform: scale(1.05);
            border: 3px solid #23a6d5;
            background: #ffffff;
            box-shadow: 0 25px 50px rgba(35, 166, 213, 0.2);
        }

        .featured-dev .dev-img { width: 200px; height: 200px; border-color: #23a6d5; }
        .featured-dev h3 { font-size: 2.5rem; color: #23a6d5; }

        .dev-card-big:hover { transform: scale(1.03) translateX(10px); }
        .dev-img-box { position: relative; flex-shrink: 0; }
        .dev-img { width: 160px; height: 160px; border-radius: 25px; object-fit: cover; border: 6px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .dev-info h3 { margin: 0; font-size: 2rem; color: var(--text-dark); font-weight: 800; }
        .role-badge-big { display: inline-block; background: var(--primary-grad); color: white; padding: 8px 20px; border-radius: 12px; font-size: 1rem; font-weight: 600; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        .section-text { margin: 0; color: #636e72; font-size: 1.1rem; font-weight: 500; }

        .edit-btn { background: #ff7675; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(255, 118, 117, 0.4); }
        .banner-edit { position: absolute; top: 30px; right: 30px; }
        .thanks-edit { position: absolute; top: 20px; right: 20px; }
        .card-edit { position: absolute; bottom: -10px; right: -10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 250px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;}
        
        /* Responsive Fix */
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .thanks-column { position: relative; top: 0; }
            .header-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header class="full-header">
        <img th:src="${bannerUrl}" class="header-bg-img">
        <div class="header-text">
            <p style="letter-spacing: 5px; font-weight: 600; margin-bottom: 10px; opacity: 0.8;">OUR CREATIVE TEAM</p>
            <h1>Meet Our Developers</h1>
        </div>
        <button th:if="${isAdmin}" class="edit-btn banner-edit" onclick="openBannerModal()">✏️</button>
    </header>

    <div class="main-layout">
        
        <aside class="thanks-column">
            <button th:if="${isAdmin}" class="edit-btn thanks-edit" onclick="openMessageModal()">✏️</button>
            <h2 class="thanks-title">Special Thanks</h2>
            <div class="thanks-message">
                <p id="currentThanksDisplay" th:text="${specialThanks != null ? specialThanks : 'We would like to express our deepest gratitude to everyone who supported us in making the BALIK GAMIT system a reality...'}"></p>
            </div>
            <div style="margin-top: 40px;">
                <a th:href="@{/}" style="color: white; text-decoration: none; border: 2px solid white; padding: 12px 30px; border-radius: 50px; font-weight: 600;">← Back Home</a>
            </div>
        </aside>

        <section class="dev-column">
            <div th:each="dev, iterStat : ${developers}" 
                class="dev-card-big" 
                th:id="'dev-card-' + ${iterStat.index}"
                th:classappend="${iterStat.last} ? 'featured-dev' : ''"
                th:data-id="${dev.id}"
                th:data-name="${dev.name}"
                th:data-contrib="${dev.contributions}"
                th:data-section="${dev.section}">
                
                <div class="dev-img-box">
                    <img th:src="${dev.photoUrl}" class="dev-img">
                    <button th:if="${isAdmin}" class="edit-btn card-edit" 
                            th:onclick="'openDevModal(' + ${iterStat.index} + ')'">✏️</button>
                </div>
                <div class="dev-info">
                    <h3 th:text="${dev.name}">Developer Name</h3>
                    <div class="role-badge-big" th:text="${dev.contributions}">Lead Programmer</div>
                    <p class="section-text">
                        Section: <span th:text="${dev.section}">BSIT 1-01</span>
                    </p>
                </div>
            </div>
        </section>

    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">Update Content</h2>
            <form id="updateForm" th:action="@{/developers/update}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" id="editId">
                <input type="hidden" name="devIndex" id="devIndex">
                
                <div id="devGroup">
                    <label>Profile Image:</label>
                    <input type="file" name="photo">
                    <input type="text" name="name" id="editName" placeholder="Full Name">
                    <input type="text" name="contributions" id="editContrib" placeholder="Role">
                    <input type="text" name="section" id="editSection" placeholder="Section">
                </div>

                <div id="thanksGroup" style="display:none;">
                    <label>Edit Message:</label>
                    <textarea name="specialThanks" id="editThanksText"></textarea>
                </div>

                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button type="submit" style="flex:1; padding:15px; background:var(--primary-grad); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">Save Changes</button>
                    <button type="button" onclick="closeModal()" style="flex:1; background:#f1f3f5; border:none; border-radius:15px; cursor:pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openDevModal(index) {
            const card = document.getElementById('dev-card-' + index);
            document.getElementById('editId').value = card.getAttribute('data-id');
            document.getElementById('devIndex').value = index; 
            document.getElementById('editName').value = card.getAttribute('data-name');
            document.getElementById('editContrib').value = card.getAttribute('data-contrib');
            document.getElementById('editSection').value = card.getAttribute('data-section');
            
            document.getElementById('modalTitle').innerText = "Edit Developer";
            document.getElementById('devGroup').style.display = 'block';
            document.getElementById('thanksGroup').style.display = 'none';
            toggleInputs(false);
            document.getElementById('editModal').style.display = 'flex';
        }

        function openBannerModal() {
            document.getElementById('editId').value = "";
            document.getElementById('devIndex').value = "-1"; // Set index to -1 for Banner
            document.getElementById('modalTitle').innerText = "Edit Banner";
            document.getElementById('devGroup').style.display = 'block'; 
            document.getElementById('thanksGroup').style.display = 'none';
            toggleInputs(false);
            document.getElementById('editName').style.display = 'none';
            document.getElementById('editContrib').style.display = 'none';
            document.getElementById('editSection').style.display = 'none';
            document.getElementById('editModal').style.display = 'flex';
        }

        function openMessageModal() {
            document.getElementById('editId').value = "";
            document.getElementById('devIndex').value = "-2"; // Set index to -2 for Special Thanks
            document.getElementById('modalTitle').innerText = "Edit Special Thanks";
            document.getElementById('devGroup').style.display = 'none';
            document.getElementById('thanksGroup').style.display = 'block';
            const currentMessage = document.getElementById('currentThanksDisplay').innerText;
            document.getElementById('editThanksText').value = currentMessage;
            toggleInputs(true);
            document.getElementById('editModal').style.display = 'flex';
        }

        function toggleInputs(isThanksMode) {
            // Enable/Disable inputs so the correct data is sent
            document.getElementById('editName').disabled = isThanksMode;
            document.getElementById('editContrib').disabled = isThanksMode;
            document.getElementById('editSection').disabled = isThanksMode;
            document.getElementById('editThanksText').disabled = !isThanksMode;
            
            // Toggle visibility
            document.getElementById('editName').style.display = isThanksMode ? 'none' : 'block';
            document.getElementById('editContrib').style.display = isThanksMode ? 'none' : 'block';
            document.getElementById('editSection').style.display = isThanksMode ? 'none' : 'block';
        }

        function closeModal() { 
            document.getElementById('editModal').style.display = 'none'; 
        }
        
        window.onclick = function(event) { 
            if (event.target == document.getElementById('editModal')) closeModal(); 
        }
    </script>
</body>
</html>
