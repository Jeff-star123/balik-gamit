<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- These tags are what Facebook "reads" when you share a link -->
    <meta property="og:type" content="website" />
    <meta property="og:url" th:content="'https://balik-gamit-production.up.railway.app/item/' + ${item.id}" />
    <meta property="og:title" th:content="'[LOST/FOUND] ' + ${item.name}" />
    <meta property="og:description" th:content="${item.description}" />
    <meta property="og:image" th:content="${item.imagePath}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <title th:text="${item.name}">Item Details</title>
    
    <!-- Link your CSS so it looks like your dashboard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <img th:src="${item.imagePath}" class="card-img-top" alt="Item Image">
                    <div class="card-body">
                        <h2 class="card-title" th:text="${item.name}"></h2>
                        <span class="badge bg-primary mb-2" th:text="${item.status}"></span>
                        <p class="card-text" th:text="${item.description}"></p>
                        <hr>
                        <p><strong>Contact:</strong> <span th:text="${item.contactInfo}"></span></p>
                        <p class="text-muted small">
                            Posted by <span th:text="${item.poster.name}"></span> 
                            on <span th:text="${item.getFormattedDate()}"></span>
                        </p>
                        <a href="/" class="btn btn-secondary w-100">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
